name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: ""
          - os: ubuntu-latest
            args: "--bundles appimage,deb"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "glasshouse ${{ github.ref_name }}"
          releaseBody: |
            Pre-built binaries — Windows installer (`.msi` / NSIS `.exe`) and Linux (`.AppImage` / `.deb`).

            Binaries are unsigned: Windows SmartScreen will warn on first run
            (More info → Run anyway). On Linux, `chmod +x` the AppImage.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
